<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Open Directive Guard</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="stylesheet" href="popup-notify.css">
</head>
<body>
  <div class="container">
    <div id="popupNotify" class="popup-notify"></div>
    <h2>Open Directive</h2>
    <p>Lets do a review of this web3 app!</p>
    <button id="guardBtn"> Guard</button>
    <button id="viewReportBtn"> View Latest Report</button>
    <button id="subscribePopupBtn">Subscribe</button>
    <button id="connectWalletBtn" class="wallet-btn" style="margin-top:16px;">Connect Wallet</button>
    <div id="walletInfo" class="wallet-info"></div>
    <div id="walletStatus" class="status-section">
      <div class="status-icon"></div>
      <span>Checking wallet status...</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
